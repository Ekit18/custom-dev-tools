name: custom-shopify-dev-tools-local

volumes:
  postgres-db:
  mongo-db:

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-db:/var/lib/postgresql/data
    networks:
      default:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    build:
      context: ..
      dockerfile: ./docker/mongo/Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_ROOT_USER: mongo
      MONGODB_ROOT_PASSWORD: mongo
      MONGODB_DATABASE: mongo
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_REPLICA_SET_NAME: rs0
      # 64 hex chars — use a random secret in production / Railway
      MONGODB_REPLICA_SET_KEY: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789abcd
      MONGODB_ADVERTISED_HOSTNAME: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-db:/bitnami/mongodb
    hostname: mongo
    networks:
      default:
        aliases:
          - mongo
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "admin",
          "-u",
          "mongo",
          "-p",
          "mongo",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
