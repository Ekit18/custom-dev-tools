volumes:
  postgres-db:
  mongo-db:

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
    labels:
      traefik.enable: false
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres-db:/var/lib/postgresql/data
    networks:
      default:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 5G
    build:
      context: ..
      dockerfile: ./docker/mongo/Dockerfile
    command: --replSet rs0 --keyFile /etc/mongo-keyfile --bind_ip_all --port 27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    labels:
      - "traefik.enable=false"
    volumes:
      - mongo-db:/data/db
    ports:
      - "27019:27017"
    hostname: mongo
    networks:
      default:
        aliases:
          - mongo
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',version:1,members:[{_id:0,host:'mongo:27017',priority:2}]}) }" | mongosh --port 27017 -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin
      interval: 30s
      timeout: 15s
      start_period: 15s

  app:
    build:
      context: ..
      dockerfile: ./docker/app/Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    env_file: ./../.env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy --schema=prisma-postgres/schema.prisma && npx prisma db push --schema=prisma-mongo/schema.prisma && npm run mongo:seed && npm run start"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      default:
